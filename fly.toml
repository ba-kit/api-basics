# fly.toml app configuration file generated for tafe-student-api
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = "tafe-student-api"
primary_region = "syd"

[build]

[http_service]
  internal_port = 5001
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[env]
  DATABASE_PATH = "/app/students.db"
  FLASK_ENV = "production"
